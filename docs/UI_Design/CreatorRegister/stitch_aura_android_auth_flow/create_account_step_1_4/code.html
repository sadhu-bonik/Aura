<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Creator Onboarding - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#2d3449",
                        "secondary": "#b9c7e0",
                        "surface-container-high": "#222a3d",
                        "tertiary": "#ffb95f",
                        "tertiary-fixed": "#ffddb8",
                        "surface-tint": "#4edea3",
                        "primary-fixed-dim": "#4edea3",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-fixed-dim": "#ffb95f",
                        "surface-container-lowest": "#060e20",
                        "surface-variant": "#2d3449",
                        "on-error": "#690005",
                        "primary-container": "#001c10",
                        "error-container": "#93000a",
                        "surface": "#0b1326",
                        "inverse-surface": "#dae2fd",
                        "secondary-container": "#3c4a5e",
                        "on-surface-variant": "#c6c6cd",
                        "on-background": "#dae2fd",
                        "tertiary-container": "#251400",
                        "surface-container": "#171f33",
                        "on-secondary-fixed": "#0d1c2f",
                        "primary-fixed": "#6ffbbe",
                        "error": "#ffb4ab",
                        "primary": "#4edea3",
                        "on-primary-fixed-variant": "#005236",
                        "surface-bright": "#31394d",
                        "on-tertiary-fixed": "#2a1700",
                        "secondary-fixed-dim": "#b9c7e0",
                        "inverse-primary": "#006c49",
                        "on-tertiary-container": "#b47300",
                        "on-tertiary": "#472a00",
                        "on-secondary-container": "#abb9d2",
                        "on-primary-container": "#009365",
                        "outline-variant": "#45464d",
                        "on-primary": "#003824",
                        "inverse-on-surface": "#283044",
                        "on-secondary-fixed-variant": "#3a485c",
                        "secondary-fixed": "#d5e3fd",
                        "surface-dim": "#0b1326",
                        "on-surface": "#dae2fd",
                        "on-primary-fixed": "#002113",
                        "on-error-container": "#ffdad6",
                        "background": "#0b1326",
                        "outline": "#909097",
                        "on-secondary": "#233144",
                        "surface-container-low": "#131b2e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-no-borders {
            border: none !important;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1326;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3449;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0b1326]/70 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full shadow-[0_0_32px_rgba(78,222,163,0.06)] tonal-shift-no-borders">
<div class="flex items-center gap-4">
<button class="hover:bg-[#171f33] transition-colors scale-95 active:scale-90 transition-transform p-2 rounded-full text-[#4edea3]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold tracking-tight text-[#dae2fd] text-lg">Creator Onboarding</h1>
</div>
<div class="flex items-center gap-2">
<button class="hover:bg-[#171f33] transition-colors scale-95 active:scale-90 transition-transform p-2 rounded-full text-[#dae2fd]">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Progress Indicator -->
<div class="mb-10">
<div class="flex justify-between items-end mb-4">
<div>
<span class="text-tertiary text-xs font-bold tracking-widest uppercase">Identity Verification</span>
<h2 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mt-1">Create Account</h2>
</div>
<div class="text-right">
<span class="text-secondary font-medium text-sm">Step 1 of 4</span>
</div>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-on-primary-container w-1/4 rounded-full"></div>
</div>
</div>
<!-- Form Section -->
<div class="space-y-8">
<!-- Hero Illustration/Visual Anchor (Asymmetric Bleed) -->
<div class="relative h-48 mb-12 rounded-xl overflow-hidden bg-surface-container">
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent z-10"></div>
<img alt="" class="w-full h-full object-cover opacity-40 grayscale" data-alt="abstract geometric 3D shapes in dark obsidian and emerald green colors with cinematic lighting and soft bokeh background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCj3Xr7p5DNm7Uf6W7iu5MwXe1I_Tz_eM-sPizwiQVxBt0CA6cJSvDfCSlIqf7NrYkLlaV4ttW0cZ6GrJw7hGPHOF-KSLsHShn2n0iWTdYtLpedh4k9Tt5_2raUq31SdqdDWVAXDld9Bif2Q5J4PalttnCUa3UPTVd0SuWedCfrmOO8h_s0IgyjUOurYLpsLWzISc92ocIlqDZG2XpYvR0Q6S0J-8y-lDzfPeZxj3FD1t5SlH9uOWupDqSp-58EOXofG9fEvAux7Mk"/>
<div class="absolute bottom-6 left-6 z-20">
<p class="text-on-surface-variant text-sm max-w-xs leading-relaxed">
                        Join our exclusive circle of curated creators. Secure your digital footprint with architectural precision.
                    </p>
</div>
</div>
<form class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-8">
<!-- Full Name -->
<div class="col-span-full">
<label class="block text-secondary text-xs font-bold tracking-widest uppercase mb-3 ml-1">Full Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-outline focus:ring-0 transition-all border-b-2 border-transparent focus:border-tertiary" placeholder="Enter your legal name" type="text"/>
</div>
</div>
<!-- Email -->
<div class="col-span-full">
<label class="block text-secondary text-xs font-bold tracking-widest uppercase mb-3 ml-1">Email Address</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-outline focus:ring-0 transition-all border-b-2 border-transparent focus:border-tertiary" placeholder="name@creator.com" type="email"/>
</div>
<!-- Password -->
<div class="col-span-1">
<label class="block text-secondary text-xs font-bold tracking-widest uppercase mb-3 ml-1">Password</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-outline focus:ring-0 transition-all border-b-2 border-transparent focus:border-tertiary" placeholder="••••••••" type="password"/>
<p class="mt-2 text-[10px] text-on-surface-variant leading-tight px-1">
                        Min 8 chars, 1 upper, 1 number.
                    </p>
</div>
<!-- Confirm Password -->
<div class="col-span-1">
<label class="block text-secondary text-xs font-bold tracking-widest uppercase mb-3 ml-1">Confirm Password</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-outline focus:ring-0 transition-all border-b-2 border-transparent focus:border-tertiary" placeholder="••••••••" type="password"/>
</div>
<!-- Phone Number -->
<div class="col-span-full">
<label class="block text-secondary text-xs font-bold tracking-widest uppercase mb-3 ml-1">Phone Number</label>
<div class="flex gap-3">
<div class="w-24 bg-surface-container-highest rounded-lg flex items-center justify-center text-on-surface font-medium">
                            +1
                        </div>
<input class="flex-1 bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-outline focus:ring-0 transition-all border-b-2 border-transparent focus:border-tertiary" placeholder="(555) 000-0000" type="tel"/>
</div>
</div>
<!-- Security Question -->
<div class="col-span-full">
<label class="block text-secondary text-xs font-bold tracking-widest uppercase mb-3 ml-1">Security Question</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-highest border-none rounded-lg p-4 text-on-surface focus:ring-0 transition-all border-b-2 border-transparent focus:border-tertiary pr-12">
<option>Select a recovery question</option>
<option>What was your first pet's name?</option>
<option>What is your mother's maiden name?</option>
<option>What city were you born in?</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-secondary">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Security Answer -->
<div class="col-span-full">
<label class="block text-secondary text-xs font-bold tracking-widest uppercase mb-3 ml-1">Security Answer</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg p-4 text-on-surface placeholder:text-outline focus:ring-0 transition-all border-b-2 border-transparent focus:border-tertiary" placeholder="Your answer" type="text"/>
</div>
<!-- Cancel Link -->
<div class="col-span-full text-center py-4">
<button class="text-outline hover:text-on-surface text-sm font-medium transition-colors" type="button">
                        Cancel registration
                    </button>
</div>
</form>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-4 px-6 pb-8 bg-[#0b1326]/80 backdrop-blur-2xl z-50 rounded-t-[1.5rem] shadow-2xl tonal-shift-no-borders bg-[#131b2e]">
<!-- Back -->
<button class="flex flex-col items-center justify-center text-[#dae2fd]/60 px-4 py-2 hover:text-[#4edea3] transition-all scale-98 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined mb-1" data-icon="chevron_left">chevron_left</span>
<span class="font-['Inter'] text-xs font-medium uppercase tracking-widest">Back</span>
</button>
<!-- Save & Exit (Treated as secondary/inactive in this flow) -->
<button class="flex flex-col items-center justify-center text-[#dae2fd]/60 px-4 py-2 hover:text-[#4edea3] transition-all scale-98 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined mb-1" data-icon="save">save</span>
<span class="font-['Inter'] text-xs font-medium uppercase tracking-widest">Save &amp; Exit</span>
</button>
<!-- Next (Active Destination) -->
<button class="flex flex-col items-center justify-center bg-gradient-to-br from-[#4edea3] to-[#009365] text-[#003824] rounded-full px-8 py-3 scale-98 active:scale-95 transition-all duration-200 shadow-lg shadow-primary/10">
<div class="flex items-center gap-2">
<span class="font-['Inter'] text-xs font-bold uppercase tracking-widest">Next</span>
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</nav>
</body></html>
