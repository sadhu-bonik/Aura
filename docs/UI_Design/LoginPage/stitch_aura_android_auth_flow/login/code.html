<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0b1326;
            color: #dae2fd;
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col justify-center items-center overflow-hidden">
<!-- Background Decoration -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[128px]"></div>
<div class="absolute top-1/2 -right-48 w-[500px] h-[500px] bg-tertiary/5 rounded-full blur-[160px]"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-8 py-12 flex flex-col">
<!-- Brand Identity -->
<header class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container mb-6 shadow-[0_0_32px_rgba(78,222,163,0.1)]">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="blur_on">blur_on</span>
</div>
<h1 class="font-headline font-extrabold text-4xl tracking-tighter text-on-surface mb-2">Aura</h1>
<p class="font-body text-on-surface-variant/80 text-sm tracking-wide">Enter your password to continue</p>
</header>
<!-- Login Form -->
<div class="space-y-8">
<!-- Account Info (Static) -->
<div class="bg-surface-container-low p-5 rounded-xl flex items-center gap-4 transition-all duration-300">
<div class="w-12 h-12 rounded-full overflow-hidden bg-surface-container-highest flex items-center justify-center">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional man with a neutral expression, soft cinematic studio lighting, dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqxqAXSezmhL9vqB9JDGvoJY1_izjxFl3Rejg67A_kO7BelFDSs_xALf6vxc5WkqojXEJt0_HOKWjM5ViODmJ4M5-0p4XEHMypqT9sNi7UDeMJp0OU9wAtsybXqLtFLJBXD9P9AmU-YzZRB5BQweouDt9pwVDzlxqEhAKRFRZtIl-CsTkoxxbHHVHvMPJlulVBQoStmvyS5DSNQ1Nwq0RT95CoXIcQFBx553KUArXA0CuZwOatamztOJlCLoRUZpZg3P1IP2mQnuQ"/>
</div>
<div class="flex flex-col">
<span class="text-xs font-semibold uppercase tracking-widest text-primary/70">Welcome back</span>
<span class="text-on-surface font-medium">user@example.com</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1" for="password">Password</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-highest border-none rounded-lg px-5 text-on-surface placeholder:text-outline/50 focus:ring-0 focus:border-none transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<!-- Custom Focus State via separate element -->
<div class="absolute bottom-0 left-0 right-0 h-[2px] bg-tertiary scale-x-0 group-focus-within:scale-x-100 transition-transform duration-300 rounded-full shadow-[0_0_8px_#ffb95f]"></div>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end mt-2">
<a class="text-xs font-semibold text-secondary hover:text-primary transition-colors tracking-tight" href="#">Forgot Password?</a>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-4 flex flex-col gap-6">
<button class="w-full h-14 bg-gradient-to-br from-primary to-on-primary-container text-on-primary font-headline font-bold text-lg rounded-full shadow-[0_16px_32px_rgba(0,147,101,0.2)] active:scale-95 transition-all duration-200">
                    Login
                </button>
<button class="w-full text-on-surface-variant hover:text-on-surface font-body font-medium transition-colors text-sm py-2">
                    Cancel
                </button>
</div>
</div>
<!-- Footer / Trust -->
<footer class="mt-auto pt-16 text-center">
<div class="flex items-center justify-center gap-2 mb-4">
<div class="h-px w-8 bg-outline-variant/20"></div>
<span class="text-[10px] text-outline-variant uppercase tracking-[0.2em] font-bold">Secure Access</span>
<div class="h-px w-8 bg-outline-variant/20"></div>
</div>
<div class="flex justify-center gap-6 opacity-40 grayscale">
<span class="material-symbols-outlined text-2xl" data-icon="shield">shield</span>
<span class="material-symbols-outlined text-2xl" data-icon="fingerprint">fingerprint</span>
<span class="material-symbols-outlined text-2xl" data-icon="lock">lock</span>
</div>
</footer>
</main>
<!-- Navigation Components (Suppressed for focused login task as per protocol) -->
</body></html>
