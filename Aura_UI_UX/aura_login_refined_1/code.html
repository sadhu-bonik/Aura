<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aura Lumina - Welcome Back</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#27252d",
                        "on-background": "#e9e3ef",
                        "surface-container-low": "#141318",
                        "on-secondary-container": "#c3bcd5",
                        "on-error": "#490013",
                        "on-tertiary-fixed-variant": "#704a6a",
                        "surface-bright": "#2d2b34",

                        "surface-tint": "#cac1ed",
                        "inverse-primary": "#615a80",
                        "secondary-fixed": "#e6dff9",
                        "on-surface-variant": "#aea9b5",
                        "primary-fixed-dim": "#c8beea",
                        "surface-container": "#1a191f",
                        "primary-dim": "#bcb3df",
                        "on-tertiary": "#6f4969",
                        "tertiary-container": "#fdcbf2",
                        "on-secondary-fixed": "#413d51",
                        "tertiary-dim": "#eebde3",
                        "on-primary-fixed-variant": "#534b71",
                        "on-error-container": "#ff97a3",
                        "tertiary": "#ffdff6",
                        "on-secondary-fixed-variant": "#5d596e",
                        "inverse-surface": "#fdf8fe",
                        "secondary-fixed-dim": "#d8d1ea",
                        "primary-container": "#554d73",
                        "surface-container-high": "#201f26",
                        "outline-variant": "#494650",
                        "surface": "#0f0e12",
                        "inverse-on-surface": "#565459",
                        "error-dim": "#c44b5f",
                        "secondary-container": "#3d394d",
                        "outline": "#77747e",
                        "on-secondary": "#423d52",
                        "tertiary-fixed": "#fdcbf2",
                        "on-tertiary-fixed": "#512e4c",
                        "secondary": "#cac3dc",
                        "error-container": "#871c34",
                        "primary-fixed": "#d6ccf9",
                        "on-primary-fixed": "#362f53",
                        "on-primary-container": "#e7dfff",
                        "surface-container-lowest": "#000000",
                        "background": "#0f0e12",
                        "surface-container-highest": "#27252d",
                        "primary": "#cac1ed",
                        "on-surface": "#e9e3ef",
                        "on-tertiary-container": "#654060",
                        "error": "#f97386",
                        "on-primary": "#423b60",
                        "tertiary-fixed-dim": "#eebde3",
                        "surface-dim": "#0f0e12"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .aura-gradient {
            background: linear-gradient(135deg, #5620e0 0%, #7a729a 100%);
        }
        .aura-glass {
            background: rgba(15, 14, 18, 0.8);
            backdrop-filter: blur(24px);
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0f0e12;
            color: #e9e3ef;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-neutral-950/80 backdrop-blur-3xl z-50">
<div class="flex items-center px-4 h-16 w-full max-w-xl mx-auto">
<button class="hover:bg-neutral-800/50 transition-colors p-2 rounded-full active:scale-95 duration-150 flex items-center justify-center text-[#5620e0]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="ml-4 text-xl font-bold text-neutral-50 tracking-tight">Aura</div>
</div>
</header>
<main class="flex-grow w-full max-w-md px-6 pt-12 pb-24 flex flex-col">
<!-- Brand Moment / Header Section -->
<div class="mb-12 text-center">
<div class="inline-block mb-8 relative">
<div class="w-24 h-24 rounded-full overflow-hidden border-2 border-primary/20 p-1">
<img class="w-full h-full object-cover rounded-full" data-alt="Modern high-resolution profile portrait of a digital creator with subtle purple lighting and a soft bokeh background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZl7LMIR3HnlFL2ghqzi2sx9WxnWInF3eRrlYN_p98-vzW_nx_jE6_c9eXhDjypShqpHSmhNJ7GeiZKOy6NP4aC2foDCw9bTJXDuU1nxOHfPRUTuj7iGYGGahJWP60_Idb91rPIuMv-PknMxSQ1U1XaRy19MvvWMBHkxpNG2raSzSVXdu-1TCN5fA8_YvyZhhPe-O9gnB5-87sM3YNXe2NYEegv-PuyCtAiU8Z6B6P7a2u672Eb0jMHWSpxZ9XNNheZuv_f_ExEw"/>
</div>
<div class="absolute -bottom-1 -right-1 bg-primary text-on-primary rounded-full p-1 border-4 border-background">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<h1 class="text-4xl font-extrabold text-on-background tracking-tight mb-2">Welcome back</h1>
<p class="text-on-surface-variant font-medium text-lg">Logged in as: creator@aura.com</p>
</div>
<!-- Form Section -->
<div class="space-y-6">
<div class="space-y-2">
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low text-on-background rounded-xl px-4 pt-2 border border-error focus:ring-2 focus:ring-[#5620e0] focus:bg-surface-container-highest transition-all duration-200 placeholder:text-outline/50" placeholder="Enter your password" type="password"/>
<label class="absolute left-4 top-1 text-[10px] font-bold uppercase tracking-widest text-primary/70">Password</label>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-background transition-colors">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<div class="flex flex-col gap-1 px-1">
<div class="flex justify-between items-center">
<p class="text-error text-xs font-medium">Incorrect password</p>
<p class="text-outline text-xs font-medium">3 attempts remaining</p>
</div>
<!-- Lockout State (Hidden by default or shown in specific flow) -->
<p class="text-error text-[11px] leading-tight font-medium hidden">Too many failed attempts. Please use Forgot Password</p>
</div>
</div>
<div class="space-y-4 pt-4">
<!-- Primary Action (Disabled state) -->
<button class="aura-gradient w-full h-14 rounded-full text-white font-bold text-lg shadow-lg shadow-[#5620e0]/10 opacity-50 cursor-not-allowed flex items-center justify-center" disabled="">
                    Login
                </button>
<!-- Text Action -->
<button class="w-full py-2 text-primary font-semibold text-sm hover:text-on-primary-container transition-colors active:scale-95 duration-150">
                    Forgot Password?
                </button>
</div>
</div>
<!-- Subtle Footer Area -->
<div class="mt-auto pt-12 space-y-4">
<button class="w-full h-12 rounded-xl text-on-surface-variant font-medium text-sm hover:bg-surface-container-low transition-colors border border-outline-variant/20">
                Cancel
            </button>
</div>
</main>
<!-- Glass Aura Decoration (Non-functional aesthetic element) -->
<div class="fixed top-[-10%] right-[-10%] w-96 h-96 aura-gradient blur-[120px] opacity-10 rounded-full -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-64 h-64 bg-[#5620e0] blur-[100px] opacity-10 rounded-full -z-10"></div>
</body></html>
