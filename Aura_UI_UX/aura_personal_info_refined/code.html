<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aura - Personal Information</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#0f0e12",
                        "surface-tint": "#cac1ed",
                        "secondary-fixed": "#e6dff9",
                        "on-secondary-fixed-variant": "#5d596e",
                        "error-dim": "#c44b5f",
                        "on-secondary-fixed": "#413d51",
                        "secondary": "#cac3dc",
                        "on-secondary": "#423d52",
                        "on-background": "#e9e3ef",
                        "surface-bright": "#2d2b34",
                        "surface-container-lowest": "#000000",
                        "inverse-surface": "#fdf8fe",
                        "secondary-dim": "#bcb5ce",
                        "tertiary-fixed-dim": "#eebde3",
                        "outline-variant": "#494650",
                        "surface-container-high": "#201f26",
                        "on-primary-fixed": "#362f53",
                        "secondary-container": "#3d394d",
                        "on-surface-variant": "#aea9b5",
                        "outline": "#77747e",
                        "inverse-on-surface": "#565459",
                        "surface-dim": "#0f0e12",
                        "primary-fixed": "#d6ccf9",
                        "surface-container-highest": "#27252d",
                        "tertiary": "#ffdff6",
                        "secondary-fixed-dim": "#d8d1ea",
                        "tertiary-fixed": "#fdcbf2",
                        "surface-variant": "#27252d",
                        "primary-fixed-dim": "#c8beea",
                        "on-primary-fixed-variant": "#534b71",
                        "on-error-container": "#ff97a3",
                        "error": "#f97386",
                        "inverse-primary": "#615a80",
                        "primary": "#cac1ed",
                        "on-primary": "#423b60",
                        "on-secondary-container": "#c3bcd5",
                        "error-container": "#871c34",
                        "on-tertiary-container": "#654060",
                        "background": "#0f0e12",
                        "on-tertiary-fixed": "#512e4c",
                        "on-tertiary": "#6f4969",
                        "on-tertiary-fixed-variant": "#704a6a",
                        "on-surface": "#e9e3ef",
                        "primary-container": "#554d73",
                        "on-primary-container": "#e7dfff",
                        "primary-dim": "#bcb3df",
                        "surface-container-low": "#141318",
                        "surface-container": "#1a191f",
                        "tertiary-dim": "#eebde3",
                        "on-error": "#490013",
                        "tertiary-container": "#fdcbf2"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0f0e12;
            color: #e9e3ef;
            -webkit-tap-highlight-color: transparent;
        }
        .aura-gradient-primary {
            background: linear-gradient(135deg, #5620e0 0%, #7a729a 100%);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-6 h-16 w-full fixed top-0 z-50 bg-neutral-950/80 backdrop-blur-xl">
<div class="flex items-center">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-neutral-800/50 transition-all active:scale-95 duration-150 text-[#5620e0]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-4 font-['Manrope'] font-semibold tracking-tight text-xl text-white">Create Account</h1>
</div>
<div class="w-10"></div>
</header>
<main class="flex-1 pt-24 pb-48 px-6 max-w-md mx-auto w-full">
<!-- Progress Indicator -->
<div class="flex gap-2 mb-8">
<div class="h-1.5 flex-1 rounded-full bg-primary/20 overflow-hidden">
<div class="h-full w-full aura-gradient-primary"></div>
</div>
<div class="h-1.5 flex-1 rounded-full bg-primary/20 overflow-hidden">
<div class="h-full w-1/2 aura-gradient-primary"></div>
</div>
<div class="h-1.5 flex-1 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Headline Section -->
<div class="mb-10">
<h2 class="text-[32px] font-bold leading-tight tracking-tight text-on-surface mb-2">Tell us about yourself</h2>
<p class="text-on-surface-variant body-lg opacity-80">Complete your basic information to personalize your Aura experience.</p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<!-- First Name -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-4" for="first-name">First Name</label>
<div class="relative group">
<input class="w-full h-14 px-6 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/50 text-on-surface placeholder:text-outline transition-all" id="first-name" placeholder="Enter your first name" type="text"/>
</div>
<p class="text-error-dim text-[11px] ml-4 font-medium">First name is required</p>
</div>
<!-- Last Name -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-4" for="last-name">Last Name</label>
<div class="relative group">
<input class="w-full h-14 px-6 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/50 text-on-surface placeholder:text-outline transition-all" id="last-name" placeholder="Enter your last name" type="text"/>
</div>
<p class="text-error-dim text-[11px] ml-4 font-medium">Last name is required</p>
</div>
<!-- Phone Number (Active Error State) -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-4" for="phone">Phone Number</label>
<div class="relative flex items-center">
<input class="w-full h-14 px-6 bg-surface-container-low border-2 border-error-dim/30 focus:border-error-dim/50 rounded-full focus:ring-2 focus:ring-error-dim/20 text-on-surface placeholder:text-outline transition-all" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
<span class="absolute right-6 material-symbols-outlined text-error-dim" data-icon="phone">phone</span>
</div>
<p class="text-error-dim text-[11px] ml-4 font-medium">Invalid phone number format</p>
</div>
<!-- Security Question Dropdown -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-4">Security Question</label>
<div class="relative">
<select class="w-full h-14 px-6 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/50 text-on-surface appearance-none transition-all cursor-pointer">
<option disabled="" selected="" value="">Select a security question</option>
<option value="1">What was the name of your first pet?</option>
<option value="2">What city were you born in?</option>
<option value="3">What is your mother's maiden name?</option>
</select>
<div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</div>
</div>
<p class="text-error-dim text-[11px] ml-4 font-medium">Please select a security question</p>
</div>
<!-- Security Answer -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-4" for="answer">Security Answer</label>
<div class="relative group">
<input class="w-full h-14 px-6 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/50 text-on-surface placeholder:text-outline transition-all" id="answer" placeholder="Your answer" type="text"/>
</div>
<p class="text-error-dim text-[11px] ml-4 font-medium">Security answer cannot be empty</p>
</div>
</form>
</main>
<!-- Footer Actions -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface/95 to-transparent">
<div class="max-w-md mx-auto space-y-3">
<button class="w-full h-14 rounded-full font-bold text-white/50 aura-gradient-primary opacity-40 cursor-not-allowed transition-all shadow-none">
                Next
            </button>
<button class="w-full h-14 rounded-full font-semibold text-primary hover:bg-surface-container-high transition-colors active:scale-[0.98]">
                Cancel
            </button>
</div>
</footer>
</body></html>
