<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#d8d1ea",
                        "on-secondary-fixed-variant": "#5d596e",
                        "inverse-on-surface": "#565459",
                        "tertiary-container": "#fdcbf2",
                        "surface-variant": "#27252d",
                        "secondary-dim": "#bcb5ce",
                        "on-surface": "#e9e3ef",
                        "surface": "#0f0e12",
                        "error-container": "#871c34",
                        "secondary-fixed": "#e6dff9",
                        "surface-container": "#1a191f",
                        "secondary-container": "#3d394d",
                        "surface-container-highest": "#27252d",
                        "surface-container-low": "#141318",
                        "background": "#0f0e12",
                        "surface-container-high": "#201f26",
                        "inverse-primary": "#615a80",
                        "outline-variant": "#494650",
                        "on-error": "#490013",
                        "on-tertiary-fixed": "#512e4c",
                        "tertiary-dim": "#eebde3",
                        "error-dim": "#c44b5f",
                        "tertiary-fixed-dim": "#eebde3",
                        "surface-tint": "#cac1ed",
                        "on-tertiary-container": "#654060",
                        "primary-fixed-dim": "#c8beea",
                        "on-primary": "#423b60",
                        "error": "#f97386",
                        "surface-bright": "#2d2b34",
                        "primary": "#cac1ed",
                        "surface-container-lowest": "#000000",
                        "on-secondary-container": "#c3bcd5",
                        "primary-container": "#554d73",
                        "tertiary": "#ffdff6",
                        "primary-dim": "#bcb3df",
                        "on-error-container": "#ff97a3",
                        "outline": "#77747e",
                        "on-primary-fixed": "#362f53",
                        "on-tertiary": "#6f4969",
                        "on-secondary-fixed": "#413d51",
                        "surface-dim": "#0f0e12",
                        "on-surface-variant": "#aea9b5",
                        "primary-fixed": "#d6ccf9",
                        "on-primary-container": "#e7dfff",
                        "tertiary-fixed": "#fdcbf2",
                        "on-primary-fixed-variant": "#534b71",
                        "inverse-surface": "#fdf8fe",
                        "on-secondary": "#423d52",
                        "on-background": "#e9e3ef",
                        "on-tertiary-fixed-variant": "#704a6a",
                        "secondary": "#cac3dc"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-neutral-900/80 backdrop-blur-xl border-b border-white/5">
<div class="flex items-center w-full gap-3">
<button class="flex items-center justify-center w-10 h-10 hover:bg-neutral-800/40 transition-colors rounded-full text-on-surface">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex items-center gap-3">
<div class="w-11 h-11 rounded-full overflow-hidden border border-primary/20 shrink-0">
<img alt="Lumina Skincare" class="w-full h-full object-cover" data-alt="Close-up profile photo of a modern, clean skincare brand logo on an aesthetic cream background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2iW8zq60-VppwADsNUPbz6657rtYbPB_JXVyCLlwQOh5ZI6LP9Bfwcra3F05zYRJzWDoeHdoCUuQ2z8i-LL4QDpmr1s2r5wDQM9s-C6MEwdCa4ruQ0QD4h_O1qAtTnP4P68SIkj_cY1lcYNK24I6e2vuBaxYdQNFg827ar-ZauO94ublqRh0KyA4BD9goU2vXhAYW1zNK7kCCg_Uo0Kz1hKPhKFyCJYGEbdq1k2dmGOIAbFv8B1IHWCb8RY5q6LGBViS4I9IiRA"/>
</div>
<div class="flex flex-col justify-center"><span class="text-neutral-100 font-bold text-sm leading-none mb-1.5">Lumina Skincare</span>
<div class="flex items-center gap-1.5 leading-none"><span class="w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_6px_rgba(202,193,237,0.6)]"></span><span class="text-[10px] font-bold tracking-widest uppercase text-primary-fixed-dim">Active Deal</span></div></div>
</div>
<div class="ml-auto">
<button class="flex items-center justify-center w-10 h-10 hover:bg-neutral-800/40 transition-colors rounded-full text-neutral-400">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</div>
</header>
<!-- Main Chat Canvas -->
<main class="flex-1 mt-16 mb-24 px-4 overflow-y-auto hide-scrollbar flex flex-col gap-4 py-4">
<!-- Date Marker -->
<div class="flex justify-center items-center py-2">
<span class="text-[10px] text-on-surface-variant/50 font-bold uppercase tracking-[0.2em] bg-surface-container-low px-4 py-1 rounded-full">Today</span>
</div>
<!-- Received Message -->
<div class="flex flex-col items-start gap-1 max-w-[85%]"><div class="bg-surface-container-low text-on-surface-variant p-4 rounded-2xl rounded-bl-none text-sm leading-relaxed border border-white/5">
                Hi Julian! We'd love to discuss the summer campaign details.
            </div>
<span class="text-[10px] text-on-surface-variant/50 ml-2 mt-1.5 uppercase tracking-wider block">10:24 AM</span></div>
<!-- Received Message with Image Attachment (Reduced size) -->
<div class="flex flex-col items-start gap-1 max-w-[70%]"><div class="bg-surface-container-low text-on-surface-variant p-4 rounded-2xl rounded-bl-none border border-white/5">
<div class="rounded-xl overflow-hidden mb-3">
<img alt="Creative Brief Preview" class="w-full h-auto aspect-video object-cover" data-alt="A minimalist aesthetic moodboard with soft purple and beige tones, featuring skincare bottles and natural elements" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbiJ8mbozv8alDehyw8dzIs4AnI3oiYsCA7Xgy3cea6o_NVeNJ3zPlMZJWFIZOmUIPTGo2XCjCTI1lUKxQkl5u9UmYP-43HU9zUItYJ8eSBXLOECSW12Fd4QfPqbd_1VPHxn5VzYLmRDvmV8b4YH4pT5p1PVBN9j-gzAqNJK1cVc9WxqzTS6J70qQYyuRIGiNlRXyFZsGsQaY0lPPMvzG2VsGFIxxOZj7Jj24q_odrwfMZOYfHQifdDcVYwy-smuhPqIGUvdHAXQ"/>
</div>
<p class="text-sm leading-relaxed px-1">Let us know your thoughts on the creative brief.</p>
</div>
<span class="text-[10px] text-on-surface-variant/50 ml-2 mt-1.5 uppercase tracking-wider block">10:25 AM</span></div>
<!-- Sent Message -->
<div class="flex flex-col items-end gap-1 self-end max-w-[85%]"><div class="bg-gradient-to-br from-primary-container to-primary/40 text-on-primary-container p-4 rounded-2xl rounded-br-none text-sm leading-relaxed shadow-lg shadow-primary/5">
                Hey! Just reviewed it, sounds great. I have some ideas for the reel structure.
            </div>
<div class="flex items-center gap-1 mr-2 mt-1.5">
<span class="text-[10px] text-on-surface-variant/60 uppercase tracking-wider">10:42 AM</span>
<span class="material-symbols-outlined text-[12px] text-primary" data-icon="done_all">done_all</span>
</div></div>
</main>
<!-- Message Input Area -->
<div class="fixed bottom-0 left-0 w-full px-4 pb-6 pt-2 bg-surface/80 backdrop-blur-md">
<div class="bg-surface-container-high rounded-full p-1.5 flex items-center gap-2 shadow-xl border border-white/5">
<button class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors shrink-0">
<span class="material-symbols-outlined" data-icon="attach_file">attach_file</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-on-surface placeholder-on-surface-variant/50 px-1 py-2" placeholder="Type a message..." type="text"/>
<button class="w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center active:scale-95 transition-transform duration-150 shrink-0 shadow-lg shadow-primary/5">
<span class="material-symbols-outlined" data-icon="send" parent_class="w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center active:scale-95 transition-transform duration-150 shrink-0 shadow-md shadow-primary/10" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</body></html>
