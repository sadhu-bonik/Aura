<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#f97386",
                        "on-tertiary-fixed": "#512e4c",
                        "surface-dim": "#0f0e12",
                        "on-error": "#490013",
                        "on-tertiary-container": "#654060",
                        "on-tertiary-fixed-variant": "#704a6a",
                        "on-error-container": "#ff97a3",
                        "on-background": "#e9e3ef",
                        "surface-bright": "#2d2b34",
                        "secondary": "#cac3dc",
                        "secondary-container": "#3d394d",
                        "inverse-primary": "#615a80",
                        "on-primary-container": "#e7dfff",
                        "tertiary-fixed-dim": "#eebde3",
                        "error-container": "#871c34",
                        "surface-container-low": "#141318",
                        "outline": "#77747e",
                        "on-surface": "#e9e3ef",
                        "primary": "#cac1ed",
                        "tertiary-container": "#fdcbf2",
                        "tertiary": "#ffdff6",
                        "surface-variant": "#27252d",
                        "inverse-surface": "#fdf8fe",
                        "tertiary-dim": "#eebde3",
                        "surface-container": "#1a191f",
                        "error-dim": "#c44b5f",
                        "on-primary": "#423b60",
                        "tertiary-fixed": "#fdcbf2",
                        "primary-container": "#554d73",
                        "on-secondary": "#423d52",
                        "surface-container-highest": "#27252d",
                        "on-tertiary": "#6f4969",
                        "on-secondary-fixed-variant": "#5d596e",
                        "on-secondary-container": "#c3bcd5",
                        "on-primary-fixed-variant": "#534b71",
                        "surface-container-high": "#201f26",
                        "primary-fixed-dim": "#c8beea",
                        "primary-dim": "#bcb3df",
                        "surface-tint": "#cac1ed",
                        "secondary-fixed": "#e6dff9",
                        "secondary-dim": "#bcb5ce",
                        "surface-container-lowest": "#000000",
                        "outline-variant": "#494650",
                        "on-primary-fixed": "#362f53",
                        "on-surface-variant": "#aea9b5",
                        "secondary-fixed-dim": "#d8d1ea",
                        "inverse-on-surface": "#565459",
                        "background": "#0f0e12",
                        "surface": "#0f0e12",
                        "on-secondary-fixed": "#413d51",
                        "primary-fixed": "#d6ccf9"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "display": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #494650; border-radius: 10px; }
        .glass-panel {
            background: rgba(15, 14, 18, 0.8);
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-slate-950/80 backdrop-blur-xl bg-gradient-to-b from-slate-900 to-transparent h-16 flex justify-between items-center px-6">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800/50 transition-colors active:scale-95 text-slate-400">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-slate-50 font-manrope font-semibold tracking-tight text-xl">Campaign Setup</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800/50 transition-colors active:scale-95 text-slate-400">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</header>
<main class="max-w-2xl mx-auto px-6 pt-24 space-y-10">
<!-- Main Section Header -->
<section class="space-y-2 text-left">
<h2 class="text-display-lg font-extrabold tracking-tight text-on-surface ml-2">Campaign Setup</h2>
<p class="text-on-surface-variant text-body-lg ml-2">Create a campaign for creators</p>
</section>
<!-- Form Canvas -->
<div class="space-y-8">
<!-- 1. CAMPAIGN TITLE -->
<div class="space-y-3">
<label class="block text-label-md font-bold uppercase tracking-widest text-on-surface-variant ml-2">Campaign Title</label>
<div class="group relative">
<input class="w-full bg-surface-container-low border-0 rounded-full px-6 py-4 text-body-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all" placeholder="Enter campaign name" type="text" value=""/>
</div>
<p class="text-error text-label-md flex items-center gap-1 ml-4">
<span class="material-symbols-outlined text-[14px]">error</span> Campaign title is required
                </p>
</div>
<!-- 2. CAMPAIGN DESCRIPTION -->
<div class="space-y-3">
<label class="block text-label-md font-bold uppercase tracking-widest text-on-surface-variant ml-2">Campaign Description</label>
<textarea class="w-full bg-surface-container-low border-0 rounded-[2rem] px-6 py-4 text-body-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all resize-none" placeholder="Describe campaign goals and theme" rows="4"></textarea>
<p class="text-error text-label-md flex items-center gap-1 ml-4">
<span class="material-symbols-outlined text-[14px]">error</span> Description is required
                </p>
</div>
<!-- 3. CAMPAIGN GOALS -->
<div class="space-y-3">
<label class="block text-label-md font-bold uppercase tracking-widest text-on-surface-variant ml-2">Campaign Goals</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full text-label-md font-medium border border-outline-variant hover:bg-surface-container transition-colors">Brand Awareness</button>
<button class="px-5 py-2.5 rounded-full text-label-md font-medium border border-outline-variant hover:bg-surface-container transition-colors">Product Launch</button>
<button class="px-5 py-2.5 rounded-full text-label-md font-medium border border-outline-variant hover:bg-surface-container transition-colors">Sales Conversion</button>
<button class="px-5 py-2.5 rounded-full text-label-md font-medium border border-outline-variant hover:bg-surface-container transition-colors">Social Media Growth</button>
</div>
<p class="text-error text-label-md flex items-center gap-1 ml-4">
<span class="material-symbols-outlined text-[14px]">error</span> Please select at least one campaign goal
                </p>
</div>
<!-- 4. BUDGET RANGE -->
<div class="space-y-3">
<label class="block text-label-md font-bold uppercase tracking-widest text-on-surface-variant ml-2">Budget Range</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-0 rounded-full px-6 py-4 text-body-lg text-on-surface appearance-none focus:ring-2 focus:ring-primary/40 transition-all">
<option disabled="" selected="" value="">Select Budget Range</option>
<option>$1000 - $5000</option>
<option>$5000 - $10,000</option>
<option>$10,000+</option>
</select>
</div>
<p class="text-error text-label-md flex items-center gap-1 ml-4">
<span class="material-symbols-outlined text-[14px]">error</span> Budget is required
                </p>
</div>
<!-- 5. TIMELINE -->
<div class="space-y-3">
<label class="block text-label-md font-bold uppercase tracking-widest text-on-surface-variant ml-2">Timeline</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 rounded-full px-6 py-4 text-body-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all" placeholder="Select timeline" type="text"/>
<span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-outline">calendar_today</span>
</div>
<p class="text-error text-label-md flex items-center gap-1 ml-4">
<span class="material-symbols-outlined text-[14px]">error</span> Timeline is required
                </p>
</div>
<!-- 6. DELIVERABLES -->
<div class="space-y-3">
<label class="block text-label-md font-bold uppercase tracking-widest text-on-surface-variant ml-2">Deliverables</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full text-label-md font-medium border border-outline-variant hover:bg-surface-container transition-colors">Instagram Post</button>
<button class="px-5 py-2.5 rounded-full text-label-md font-medium border border-outline-variant hover:bg-surface-container transition-colors">Reel</button>
<button class="px-5 py-2.5 rounded-full text-label-md font-medium border border-outline-variant hover:bg-surface-container transition-colors">Story</button>
<button class="px-5 py-2.5 rounded-full text-label-md font-medium border border-outline-variant hover:bg-surface-container transition-colors">YouTube Video</button>
</div>
<p class="text-error text-label-md flex items-center gap-1 ml-4">
<span class="material-symbols-outlined text-[14px]">error</span> Please select at least one deliverable
                </p>
</div>
<!-- Buttons -->
<div class="pt-8 space-y-4">
<button class="w-full py-5 rounded-full bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-bold text-body-lg shadow-[0_8px_24px_rgba(86,32,224,0.3)] hover:scale-[1.02] active:scale-95 transition-all opacity-50 pointer-events-none">
                    Save Campaign
                </button>
<button class="w-full py-5 rounded-full border-2 border-outline-variant text-on-surface font-semibold text-body-lg hover:bg-surface-container-low transition-colors">
                    Save &amp; Exit
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
</body></html>
